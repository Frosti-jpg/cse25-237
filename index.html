<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--Top portion of the header-->
  <header>
    <div class="top-header">
      <div class="left">
        <a href="index.html">
          <h1>Project-Finder</h1>
        </a>
      </div>

      <div class="searchbar">
        <input type="text" placeholder="Search...">
      </div>

      <div class="right">
        <nav>
          <button class="cart-icon" id="cart-icon">
            <img src="Images/Header Icons/Cart.png" alt="Cart" width="24" height="auto">
            <span class="badge" id="cart-badge" style="display:none;">0</span>
          </button>
          <img src="Images/Header Icons/Profile.png" alt="Profile">
        </nav>
      </div>
    </div>
    
    <!--Bottom portion of the header-->
    <div class="bottom-header">
      <div class="left"></div> <!--Dividing the space into 3 sections-->

      <div class="center">
        <nav>
          <a href="index.html" class="active">Home</a>
          <a href="shop.html">Shop</a>
          <a href="prebuilts.html">PreBuilt PCs</a>
        </nav>
      </div>

      <div class="right">
        <nav>
          <a href="about.html">About</a>
          <a href="support.html">Support</a>
          <a href="feedback.html">Feedback</a>
        </nav>
      </div>
    </div>

  </header>
  
  <main class="home">
    <section id="featured-section">
      <h2>Featured</h2>
      <!--Carousel area-->
      <div id="carousel-container">

        <article id="carousel-spotlight">
          <a href="product.html">
            <img src="Images/Picture1.png" alt="Picture of Custom PreBuilt PC">
          </a>

          <div class="product-info">

            <div class="product-details">
              <a href="product.html">
                <h3>Product Name</h3>
                <p>Condition</p>
              </a>
            </div>
            
            <div class="price-and-cart">
              <h4>Price</h4>
              <button type="button" class="addtocart-button">Add To Cart</button>
            </div>

          </div>
        </article>

        <div class="carousel-controls">

          <button type="button" class="arrow-button">←</button>

          <div class="carousel-dots">
            <button type="button" class="dot-button"></button>
            <button type="button" class="dot-button"></button>
            <button type="button" class="dot-button"></button>
            <button type="button" class="dot-button"></button>
          </div>

          <button type="button" class="arrow-button">→</button>

        </div>
        
      </div>
    </section>

    <!--Bottom navigation buttons-->
    <div class="bottom-nav">

      <a href="shop.html" class="button">
        <span class="button-label">Shop PC Parts</span>
      </a>

      <a href="prebuilts.html" class="button">
        <span class="button-label">Shop PreBuilt PCs</span>
      </a>

      <a href="support.html" class="button">
        <span class="button-label">Reach out to Support</span>
      </a>

      <a href="about.html" class="button">
        <span class="button-label">About our company</span>
      </a>

    </div>

  </main>

  <footer>
    <p>&copy;Robin</p>
  </footer>
  
  <!-- ===================== CART SIDEBAR =================== -->
  <div class="cart-overlay" id="cart-overlay"></div>

  <aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      Shopping Cart
      <button class="close-btn" id="close-cart">✕</button>
    </div>

    <div class="cart-items" id="cart-items">
      <p class="empty-cart">Your cart is empty.</p>
    </div>

    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span id="cart-total">BWP 0</span>
      </div>
      <button class="btn-orange" style="width:100%;">Checkout</button>
    </div>
  </aside>

  <script src="asidecart.js"></script>
</body>
</html>
