<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Project Finder</title>
  <link rel="stylesheet" href="">

  <style>
    
  *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  }

  header {
      background-color: #1c1c1c;
  }

  body {
      /*font-family: Arial, Helvetica, sans-serif;*/
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      font-weight: 400;
      color: #1c1c1c;
      background-color: #f2f2f2;
      margin: 0%;
      padding: 0%;
      line-height: 1.8;
  }

  footer {
      background-color: #1c1c1c;
      display: flex;
      justify-content: center;

      margin-top: 46px;
  }

  footer p {
      color: #f2f2f2;
      padding-bottom: 10px;
      padding-top: 10px;
  }

  /* HEADER AREA */

  /* Top Header Part */
  .top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;

      background-color: #1c1c1c;
      color: #f2f2f2;

      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 27px;
      padding-right: 27px;
  }

  .top-header .left, .top-header .center, .top-header .right {
      flex: 1;
      justify-content: center;
      align-items: center;
  }

  .top-header .left h1 {
      display: flex;
      width: 265px;
      height: auto;
      
  }

  .top-header .right nav {
      display: flex;
      justify-content: center;
      gap: 20px;
  }

  .top-header .right {
      flex: 1;
      display: flex;
      justify-content:flex-end ;

  }

  .top-header .left a {
      text-decoration: none;
      color: #f2f2f2;

  }

  .searchbar input {
      border-radius: 20px;
      background-color: #585858;
      color: #f2f2f2;
      width: 400px;
      border: none;
      padding: 8px 16px;
  }

  .searchbar input::placeholder {
      color: #f2f2f2;
      text-align: center;
  }

  /* Bottom header part */
  .bottom-header {
      display: flex;
      align-items: center;
      justify-content: space-between;

      background-color: #f2f2f2;
      color: #1c1c1c;
      border-bottom: #1c1c1c;
      border-style: solid;
      border-left: 0px; 
      border-right: 0px; 
      border-top: 0px;
      padding-left: 27px; 
      padding-right: 27px;
      padding-top: 8px;
      padding-bottom: 8px;
  }


  .bottom-header .left, .bottom-header .center, .bottom-header .right {
      flex: 1;
  }


  .bottom-header .center nav {
      display: flex;
      justify-content: center;
      gap: 20px;
  }


  .bottom-header .right {
      flex: 1;
      display: flex;
      justify-content: flex-end;
  }

  .bottom-header .right nav {
      display: flex;
      gap: 20px;
  }


  /* Bottom header nav link behaviors */
  .bottom-header .right nav a, .bottom-header .center nav a {
      text-decoration: none;
      font-weight:500;
      color: #1c1c1c;
  }

  .bottom-header .right nav a:active, .bottom-header .center nav a:active {
      color: #EB9234;
      text-decoration: none;
  }


  .bottom-header .right nav a:hover, .bottom-header .center nav a:hover {
      color: #EB9234;
      text-decoration: underline
  }

  .bottom-header .right nav a:visited, .bottom-header .center nav a:visited {
      text-decoration: none;
  }

#product-title {
  font-size: 22px; font-weight: 500;
  text-align: center; margin-bottom: 24px;
}

.product-gallery {
  display: grid;
  grid-template-columns: 580px 1fr;
  gap: 6px;
  margin-bottom: 24px;
}

#main-picture {
  height: 400px;
  border-radius: 8px;
  overflow: hidden;
}
#main-picture img { width: 100%; height: 100%; object-fit: cover; }

#pictures {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
#pictures img {
  width: 100%; height: 197px;
  object-fit: cover; border-radius: 8px; cursor: pointer;
}

.purchase-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0;
  border-top: 1px solid #f2f2f2;
  border-bottom: 1px solid #f2f2f2;
  margin-bottom: 24px;
}

#product-condition {
  background-color: aquamarine;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase; 
  letter-spacing: 1px; color: #888;
  margin-bottom: 4px;
}
#product-price {
  font-size: 22px;
  font-weight: 600;
}

.purchase-row button {
  border-radius: 8px;
  padding-left: 6px;
  padding-right: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.product-info {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 32px;
}

.product-specifications .spec-item {
  padding: 10px 0;
  border-bottom: 1px solid #f2f2f2;
  font-size: 14px;
}

.product-details {
  font-size: 14px;
  line-height: 26px; 
  color: #1c1c1c;
  display: flex; 
  flex-direction: 
  column; gap: 12px;
}

  </style>
</head>

<body>
  <header>
    <div class="top-header">
      <div class="left">
        <a href="index.html">
          <h1>Project-Finder</h1>
        </a>
      </div>

      <div class="searchbar">
        <input type="text" placeholder="Search...">
      </div>

      <div class="right">
        <nav>
          <a href="cart.html">
            <img src="Images/Header Icons/Cart.png" alt="Cart" width="24" height="auto">
          </a>
          <a href="login.html">
            <img src="Images/Header Icons/Profile.png" alt="Profile" width="24" height="auto">
          </a>
        </nav>
      </div>
    </div>
    
    <!--Bottom portion of the header-->
    <div class="bottom-header">
      <div class="left"></div> <!--Dividing the space into 3 sections-->

      <div class="center">
        <nav>
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="prebuilts.html">PreBuilt PCs</a>
        </nav>
      </div>

      <div class="right">
        <nav>
          <a href="about.html">About</a>
          <a href="support.html">Support</a>
          <a href="feedback.html">Feedback</a>
        </nav>
      </div>
    </div>

  </header>

  <main>

    <h2 id="product-title">Emira L3 Lite</h2>

    <div class="product-gallery">
      <div id="main-picture">
        <img src="Images/ProArt 4070/Underneath (Small).jpg" alt="">
      </div>
      <div id="pictures">
        <img src="Images/ProArt 4070/In Box Pic (Small).jpg" alt="">
        <img src="Images/ProArt 4070/In Open PC (Small).jpg" alt="">
        <img src="Images/ProArt 4070/Thumbnail (Small).jpg" alt="">
        <img src="Images/ProArt 4070/In PC (Small).png" alt="">
      </div>
    </div>
    <section class="purchase-row">
      <div class="product-price-container">
        <p id="product-condition">New</p>
        <p id="product-price">BWP</p>
      </div>
      <button type="button">Add To Cart</button>
    </section>
    <section class="product-info">
      <article class="product-specifications">

      </article>
      <article class="product-details">

      </article>
    </section>

  </main>

  <footer>
    <p>&copy;Robin</p>
  </footer>
</body>
</html>
