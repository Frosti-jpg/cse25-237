<body>
  <header>
    <div class="top-header">
      <div class="left">
        <a href="index.html">
          <h1>Project-Finder</h1>
        </a>
      </div>

      <div class="searchbar">
        <input type="text" placeholder="Search...">
      </div>

      <div class="right">
        <nav>
          <a href="cart.html">
            <img src="Images/Header Icons/Cart.png" alt="Cart" width="24" height="auto">
          </a>
          <a href="login.html">
            <img src="Images/Header Icons/Profile.png" alt="Profile" width="24" height="auto">
          </a>
        </nav>
      </div>
    </div>
    
    <!--Bottom portion of the header-->
    <div class="bottom-header">
      <div class="left"></div> <!--Dividing the space into 3 sections-->

      <div class="center">
        <nav>
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="prebuilts.html">PreBuilt PCs</a>
        </nav>
      </div>

      <div class="right">
        <nav>
          <a href="about.html">About</a>
          <a href="support.html" class="active">Support</a>
          <a href="feedback.html">Feedback</a>
        </nav>
      </div>
    </div>

  </header>
  <main>
    <div class="fill-in">
    <h2>Support</h2>
    <p>How may we be of service?</p>
    <br>
      <form>
        <label for="firstname">First Name:</label><br>
        <input type="text" class="textbox" id="firstname" name="firstname"><br><br>
        <label for="lastname">Last Name:</label><br>
        <input type="text" class="textbox" id="lastname" name="lastname"><br><br>
        <label for="phoneno">Phone Number:</label><br>
        <input type="tel" class="textbox" id="phoneno" name="phoneno"><br><br>
        <label for="emailadd">Email Address:</label><br>
        <input type="email" class="textbox" id="emailadd" name="emailadd"><br><br>
        <label for="description">Please tell us the problem(s) you are experiencing:</label><br>
        <textarea id="description" name="description"></textarea><br><br>
        <input type="submit" class="submit" value="Submit Feedback">
      </form>
      <br>
    <p>Our team of experts will review your report after submission and email you as soon as possible!</p>
    </div>
  </main>
  <footer>
    <p>&copy;Robin</p>
  </footer>
