<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PreBuilts - Project Finder</title>
  <link rel="stylesheet" href="style.css"> 
</head>

<body>
  <header>
    <div class="top-header">
      <div class="left">
        <a href="index.html">
          <h1>Project-Finder</h1>
        </a>
      </div>

      <div class="searchbar">
        <input type="text" placeholder="Search...">
      </div>

      <div class="right">
        <nav>
          <a href="cart.html">
            <img src="Images/Header Icons/Cart.png" alt="Cart" width="24" height="auto">
          </a>
          <a href="login.html">
            <img src="Images/Header Icons/Profile.png" alt="Profile" width="24" height="auto">
          </a>
        </nav>
      </div>
    </div>
    
    <!--Bottom portion of the header-->
    <div class="bottom-header">
      <div class="left"></div> <!--Dividing the space into 3 sections-->

      <div class="center">
        <nav>
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="prebuilts.html"  class="active">PreBuilt PCs</a>
        </nav>
      </div>

      <div class="right">
        <nav>
          <a href="about.html">About</a>
          <a href="support.html">Support</a>
          <a href="feedback.html">Feedback</a>
        </nav>
      </div>
    </div>

  </header>

  <main>
    <section class="categories">
      <h2>Categories</h2>
      <nav>
        <button onclick="filterSelection('all')">All</button>
        <button onclick="filterSelection('<5000')">Under P5000</button>
        <button onclick="filterSelection('5000to15000')">P5000 - P15000</button>
        <button onclick="filterSelection('>15000')">Over P15000</button>
      </nav>
    </section>

    <section class="product-grid">

      <article class="product-card">
        <a href="product.html">
          <img src="Images/Picture1.png" alt="Picture of an RTX3070 Ti PC">
        </a>
        <div class="product-info">
          <a href="product.html">
            <h3 class="product-title">Asus TUF Gaming GeForce RTX5070 Ti 16GB</h3>
            <p class="product-condition">Used</p>
          </a>
          <div class="purchase-row">
            <span class="product-price">BWP 35000</span>
            <button type="button" class="tocart-button">Add To Cart</button>
          </div>
        </div>

      </article>

      <article class="product-card">
        <a href="product.html">
          <img src="Images/Picture2.png" alt="Picture of 5080 16GB">
        </a>
        <div class="product-info">
          <a href="product.html">
            <h3 class="product-title">Asus TUF Gaming GeForce RTX5070 Ti 16GB</h3>
            <p class="product-condition">Used</p>
          </a>
          <div class="purchase-row">
            <span class="product-price">BWP 35000</span>
            <button type="button" class="tocart-button">Add To Cart</button>
          </div>
        </div>

      </article>

      <article class="product-card">
        <a href="product.html">
          <img src="Images/Picture3.png" alt="Picture of 5070 Ti 16GB">
        </a>
        <div class="product-info">
          <a href="product.html">
            <h3 class="product-title">Asus TUF Gaming GeForce RTX5070 Ti 16GB</h3>
            <p class="product-condition">Used</p>
          </a>
          <div class="purchase-row">
            <span class="product-price">BWP 35000</span>
            <button type="button" class="tocart-button">Add To Cart</button>
          </div>
        </div>

      </article>

    </section>
  </main>
  <footer>
    <p>&copy;Robin</p>
  </footer>
</body>
</html>
