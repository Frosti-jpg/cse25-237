<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PreBuilts - Project Finder</title>
  <link rel="stylesheet" href="style.css"> 
</head>

<body>
  <header>
    <div class="top-header">
      <div class="left">
        <a href="index.html">
          <h1>Project-Finder</h1>
        </a>
      </div>

      <div class="searchbar">
        <input type="text" placeholder="Search...">
      </div>

      <div class="right">
        <nav>
          <button class="cart-icon" id="cart-icon">
            <img src="Images/Header Icons/Cart.png" alt="Cart">
            <span class="badge" id="cart-badge" style="display:none;">0</span>
          </button>
          <img src="Images/Header Icons/Profile.png" alt="Profile">
        </nav>
      </div>
    </div>
    
    <!--Bottom portion of the header-->
    <div class="bottom-header">
      <div class="left"></div> <!--Dividing the space into 3 sections-->

      <div class="center">
        <nav>
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="prebuilts.html"  class="active">PreBuilt PCs</a>
        </nav>
      </div>

      <div class="right">
        <nav>
          <a href="about.html">About</a>
          <a href="support.html">Support</a>
          <a href="feedback.html">Feedback</a>
        </nav>
      </div>
    </div>

  </header>

  <main>
    <section class="categories">
      <h2>Categories</h2>
      <nav>
        <button onclick="filterSelection('all')">All</button>
        <button onclick="filterSelection('lessthan5000')">Under P5000</button>
        <button onclick="filterSelection('5000to15000')">P5000 - P15000</button>
        <button onclick="filterSelection('morethan15000')">Over P15000</button>
      </nav>
    </section>

    <section class="product-grid">

      <article class="product-card" data-category="5000to15000">
        <a href="product.html">
          <img src="Images/Picture1.png" alt="Picture of an RTX3070 Ti PreBuilt PC">
        </a>
        <div class="product-info">
          <a href="product.html">
            <h3 class="product-title">Monochrome V3</h3>
            <p class="product-condition" style="color: #42f56f;">New</p>
          </a>
          <div class="purchase-row">
            <span class="product-price">BWP 14999</span>
            <button type="button" class="tocart-button">Add To Cart</button>
          </div>
        </div>

      </article>

      <article class="product-card" data-category="lessthan5000">
        <a href="product.html">
          <img src="Images/AllProducts/PreBuillts/1660SuperBuild.jpg" alt="Picture of an GTX 1660 Super PreBuilt PC">
        </a>
        <div class="product-info">
          <a href="product.html">
            <h3 class="product-title">Stormtrooper Lite</h3>
            <p class="product-condition" style="color: #42f56f;">New</p>
          </a>
          <div class="purchase-row">
            <span class="product-price">BWP 4999</span>
            <button type="button" class="tocart-button">Add To Cart</button>
          </div>
        </div>

      </article>

      <article class="product-card" data-category="5000to15000">
        <a href="product.html">
          <img src="Images/AllProducts/PreBuillts/3060TiBuild.jpg" alt="Picture of an RTX 3060 Ti PreBuilt PC">
        </a>
        <div class="product-info">
          <a href="product.html">
            <h3 class="product-title">Monochrome Lite 3</h3>
            <p class="product-condition" style="color: #42f56f;">New</p>
          </a>
          <div class="purchase-row">
            <span class="product-price">BWP 12999</span>
            <button type="button" class="tocart-button">Add To Cart</button>
          </div>
        </div>

      </article>

      <article class="product-card" data-category="morethan15000">
        <a href="product.html">
          <img src="Images/AllProducts/PreBuillts/5080Build.jpg" alt="Picture of an RTX 5080 PC">
        </a>
        <div class="product-info">
          <a href="product.html">
            <h3 class="product-title">Shadow V3</h3>
            <p class="product-condition" style="color: #42f56f;">New</p>
          </a>
          <div class="purchase-row">
            <span class="product-price">BWP 35999</span>
            <button type="button" class="tocart-button">Add To Cart</button>
          </div>
        </div>

      </article>

    </section>
  </main>
  <footer>
    <p>&copy;Robin</p>
  </footer>

  <div class="cart-overlay" id="cart-overlay"></div>

  <aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      Shopping Cart
      <button class="close-btn" id="close-cart">✕</button>
    </div>

    <div class="cart-items" id="cart-items">
      <p class="empty-cart">Your cart is empty.</p>
    </div>

    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span id="cart-total">BWP 0</span>
      </div>
      <button class="btn-orange" style="width:100%;">Checkout</button>
    </div>
  </aside>

  <script src="asidecart.js"></script>
  
  <script src="script.js"></script>
</body>
</html>
